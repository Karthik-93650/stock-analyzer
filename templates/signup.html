<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Stock Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container" style="max-width: 450px;">
    <h1>Sign Up</h1>

    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {% if category == 'error' %}
                            <strong>Error:</strong> {{ message }}
                        {% else %}
                            {{ message }}
                        {% endif %}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a strong password">
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required style="width: 100%; padding: 12px; border: 1px solid #4b5563; border-radius: 8px; background: #1f2937; color: #f9fafb; font-size: 16px;">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit">Create Account</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: #cbd5e0; font-size: 15px;">Already have an account? <a href="{{ url_for('login') }}" style="color: #a855f7; text-decoration: none; font-weight: bold; letter-spacing: 0.5px;">Login here</a></p>
    </div>
</div>

</body>
</html>
