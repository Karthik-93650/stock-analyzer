<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stock Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container" style="max-width: 450px;">
    <h1>Login</h1>

    <div class="flash-messages">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {% if category == 'error' %}
                            <strong>Error:</strong> {{ message }}
                        {% else %}
                            {{ message }}
                        {% endif %}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit">Access Dashboard</button>
    </form>
    
    <div style="text-align: center; margin-top: 25px;">
        <p style="color: #cbd5e0; font-size: 15px;">Don't have an account? <a href="{{ url_for('signup') }}" style="color: #a855f7; text-decoration: none; font-weight: bold; letter-spacing: 0.5px;">Sign up here</a></p>
    </div>
</div>

</body>
</html>
